# PostgreSQL Client Authentication Configuration File
# ===================================================
#
# See pg_hba.conf(5) and the PostgreSQL docs for full syntax.
#
# This file is rendered by task_3/hive-start.sh into
# /etc/postgresql/16/main/pg_hba.conf on team-02-dn-01.
#
# What is customised relative to the Ubuntu default:
#   * the default "host all all 127.0.0.1/32 scram-sha-256" line is commented
#     out (it lives below, prefixed with #)
#   * two extra "host metastore hive ..." records are added so the hive user
#     can reach the metastore DB from team-02-jn (HiveServer2) and
#     team-02-nn (metastore-client / beeline checks) using a plaintext
#     password (matches the password Hive sends from hive-site.xml)


# Database administrative login by Unix domain socket
local   all             postgres                                peer

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# "local" is for Unix domain socket connections only
local   all             all                                     peer
# IPv4 local connections (default scram-sha-256 disabled in favour of the
# explicit metastore/hive rules below):
#host    all             all             127.0.0.1/32            scram-sha-256
# IPv6 local connections:
host    all             all             ::1/128                 scram-sha-256
# Allow replication connections from localhost, by a user with the
# replication privilege.
local   replication     all                                     peer
host    replication     all             127.0.0.1/32            scram-sha-256
host    replication     all             ::1/128                 scram-sha-256

# Hive metastore: allow the hive user to reach the metastore DB from
# HiveServer2 (jn) and from the metastore-client / beeline checks on nn.
host    metastore       hive            team-02-jn              password
host    metastore       hive            team-02-nn              password

---
- name: Install acl (required for become to unprivileged users)
  become: true
  ansible.builtin.apt:
    name: acl
    state: present
    update_cache: yes

- name: Comment line 127.0.0.1 localhost in /etc/hosts
  become: true
  ansible.builtin.replace:
    path: /etc/hosts
    regexp: '^(127\.0\.0\.1\s+localhost.*)$'
    replace: '#\1'

- name: Comment lines IPv6 in /etc/hosts
  become: true
  ansible.builtin.replace:
    path: /etc/hosts
    regexp: '^(::1|fe00::0|ff00::0|ff02::1|ff02::2)(\s+.*)$'
    replace: '#\1\2'

- name: Add cluster's nodes /etc/hosts
  become: true
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ item.ip }} {{ item.name }}"
    regexp: "\\s{{ item.name }}$"
    state: present
  loop: "{{ cluster_hosts }}"
